title-block-banner: false

execute:
  enabled: false

format:
  revealjs:
    theme: simple
    css: amlab-slides.css
    filters:
      - reveal-panel-headings.lua
    controls: true
    slide-number: c/t
    progress: true
    hash: true
    history: true
    center: false
    mouse-wheel: true
    transition: slide
    background-transition: fade
    preview-links: auto
    footer: Applied Math Lab
    width: 1400
    height: 900
    margin: 0.2
    code-overflow: wrap
    scrollable: true
    # Increase default code block height to reduce inline scrollbars on slides
    code-block-height: "650"
    # Template-provided options
    subtitle: ''
    output-ext: htm
    toc: true
    toc-depth: 1
    menu: true
